name: Pruebas funcionales

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  functional-tests:
    name: Cucumber + Playwright
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: gestion_abarrotes_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_NAME: gestion_abarrotes_test
      DB_USER: root
      DB_PASS: root
      PLAYWRIGHT_HEADLESS: "true"

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Preparar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_mysql, mbstring, dom, xml, xmlwriter
          coverage: none

      - name: Instalar dependencias PHP
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Instalar dependencias Node.js
        run: npm ci

      - name: Instalar navegador de Playwright
        run: npx playwright install --with-deps chromium

      - name: Ejecutar pruebas funcionales
        run: npm run test:functional

      - name: Publicar reportes de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-functional-reports
          path: testing/reports/
          if-no-files-found: ignore
